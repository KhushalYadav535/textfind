version: "3.9"

services:
  ocr-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: textfind-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # ✅ PaddleOCR models volume — 5GB models sirf ek baar download honge
      # Docker rebuild pe bhi models SAFE rahenge
      - paddleocr_models:/root/.paddleocr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  # Named volume — docker-compose down karne pe bhi yeh DELETE NAHI HOGA
  # Sirf: docker-compose down -v  karne pe delete hoga (mat karna!)
  paddleocr_models:
    name: textfind_paddle_models
